name: "Compliance Check"

on:
  push:
    branches: [main]
    paths: ['src/**', 'package.json', 'tsconfig.json']
  pull_request:
    branches: [main]

jobs:
  check:
    name: "TypeScript + Build"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
